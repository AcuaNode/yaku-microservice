services:
  # =========================================================================
  # CENTRAL MESSAGE BUS
  # =========================================================================
  kafka:
    image: apache/kafka:latest
    container_name: yaku-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 0
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  # =========================================================================
  # DATABASES
  # =========================================================================

  equipment-db:
    image: postgres:latest
    container_name: yaku-equipment-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yaku_equipment
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - equipment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d yaku_equipment"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  subscription-db:
    image: postgres:latest
    container_name: yaku-subscription-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - subscription_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  iam-db:
    image: postgres:latest
    container_name: yaku-iam-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: yaku_iam
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - iam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d yaku_iam"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  notification-db:
    image: postgres:latest
    container_name: yaku-notification-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: yaku_notifications
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d yaku_notifications"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  telemetry-db:
    image: postgres:latest
    container_name: yaku-telemetry-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: yaku_telemetry
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - telemetry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d yaku_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yaku-network

  # =========================================================================
  # MICROSERVICES
  # =========================================================================

  api-gateway:
    build:
      context: ./yaku-apigateway
    container_name: yaku-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://iam-db:5432/yaku_iam
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EQUIPMENT_SERVICE_URL=http://equipment-service:8080
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080
      - SUBSCRIPTION_SERVICE_URL=http://subscription-service:8080
      - TELEMETRY_SERVICE_URL=http://telemetry-service:8080
    depends_on:
      kafka:
        condition: service_healthy
      iam-db:
        condition: service_healthy
      equipment-service:
        condition: service_started
      telemetry-service:
        condition: service_started
      notification-service:
        condition: service_started
      subscription-service:
        condition: service_started
    networks:
      - yaku-network

  equipment-service:
    build:
      context: ./yaku-equipment-microservice
    container_name: yaku-equipment-service
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://equipment-db:5432/yaku_equipment
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      equipment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yaku-network

  telemetry-service:
    build:
      context: ./yaku-telemetry-microservice
    container_name: yaku-telemetry-service
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://telemetry-db:5432/yaku_telemetry
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      telemetry-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yaku-network

  notification-service:
    build:
      context: ./yaku-notification-microservice
    container_name: yaku-notification-service
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notification-db:5432/yaku_notifications
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yaku-network

  subscription-service:
    build:
      context: ./yaku-subscription-microservice
    container_name: yaku-subscription-service
    ports:
      - "8084:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://subscription-db:5432/mydatabase
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      subscription-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - yaku-network

# =========================================================================
# VOLUMES
# =========================================================================

volumes:
  equipment_data:
  subscription_data:
  iam_data:
  notification_data:
  telemetry_data:

# =========================================================================
# NETWORK
# =========================================================================

networks:
  yaku-network:
    driver: bridge